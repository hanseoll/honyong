<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>구글시트 ID 설정 도우미</title>
<style>body{font-family:system-ui,sans-serif;background:#fff7fb;color:#4c3b5f;margin:0;padding:24px}.wrap{max-width:760px;margin:auto;background:white;border:1px solid #f0d7e3;border-radius:24px;padding:24px;box-shadow:0 16px 50px #b67ba522}h1{margin-top:0}input,textarea,button{box-sizing:border-box;width:100%;padding:14px;border-radius:14px;border:1px solid #e4c9d8;font:inherit}button{margin-top:12px;background:#f28bb3;color:white;border:0;font-weight:700}textarea{height:220px;margin-top:14px;font-family:ui-monospace,monospace}.hint{background:#fce8f1;padding:14px;border-radius:14px}</style></head>
<body><div class="wrap"><h1>구글시트 ID 설정 도우미</h1><p class="hint">구글시트 주소 전체를 붙여 넣으면 <code>config.js</code>에 넣을 내용을 만들어줘요.</p><input id="url" placeholder="https://docs.google.com/spreadsheets/d/여기에_ID/edit"><button id="make">설정 내용 만들기</button><textarea id="out" readonly></textarea><button id="copy">복사하기</button></div>
<script>const sheets={fanInfo:'팬정보',currentDebts:'현재업보',honyodan:'호뇽단',games:'게임',notices:'공지',schedule:'스케줄표',settings:'설정'};make.onclick=()=>{const v=url.value.trim();const m=v.match(/\/spreadsheets\/d\/([^/]+)/);const id=m?m[1]:v;out.value=`window.BROADCAST_PAGE_CONFIG = ${JSON.stringify({spreadsheetId:id,sheets,useSampleDataOnError:true},null,2)};`;};copy.onclick=async()=>{await navigator.clipboard.writeText(out.value);copy.textContent='복사됨!';setTimeout(()=>copy.textContent='복사하기',1200)};</script></body></html>
